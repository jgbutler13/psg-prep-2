<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Perennial Services Group | Prep</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PSG Prep">
<meta name="theme-color" content="#1a3028">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a3028'/><text y='68' x='50' text-anchor='middle' font-size='52' font-family='Georgia,serif' fill='%237fb89a'>P</text></svg>">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#1a3028;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;}
  .loader{text-align:center;color:#fafaf8;}
  .p{font-family:Georgia,serif;font-size:64px;color:#7fb89a;margin-bottom:12px;line-height:1;}
  .title{font-size:15px;color:rgba(255,255,255,0.6);letter-spacing:1px;margin-bottom:28px;}
  .dots{display:flex;gap:8px;justify-content:center;}
  .dot{width:8px;height:8px;border-radius:50%;background:#7fb89a;animation:pulse 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation-delay:0.2s;}
  .dot:nth-child(3){animation-delay:0.4s;}
  @keyframes pulse{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1.1);}}
  .err{color:#b85c38;font-size:13px;margin-top:16px;display:none;}
</style>
</head>
<body>
<div class="loader">
  <div class="p">P</div>
  <div class="title">PERENNIAL SERVICES GROUP</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="err" id="err">Failed to load. <a href="#" onclick="load()" style="color:#7fb89a;">Retry</a></div>
</div>
<script>
const GIST = 'https://api.github.com/gists/75202269e4b6d2fd8bfddcfc85ab0ccf';
const TOKEN = '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';
const APP_FILE = 'psg_app.html';

async function load() {
  document.getElementById('err').style.display = 'none';
  try {
    const res = await fetch(GIST, {
      headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const html = data.files?.[APP_FILE]?.content;
    if (!html) throw new Error('App file not found in Gist');
    // Replace current page with the app HTML
    document.open(); document.write(html); document.close();
  } catch(e) {
    document.getElementById('err').style.display = 'block';
    document.getElementById('err').textContent = 'Load failed: ' + e.message + ' — ';
    const retry = document.createElement('a');
    retry.href='#'; retry.textContent='Retry'; retry.style.color='#7fb89a';
    retry.onclick = (ev) => { ev.preventDefault(); load(); };
    document.getElementById('err').appendChild(retry);
  }
}
load();
</script>
</body>
</html>
