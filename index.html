<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Perennial Services Group | Prep</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PSG Prep">
<meta name="theme-color" content="#1a3028">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
#loader{background:#1a3028;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;}
.p{font-family:Georgia,serif;font-size:72px;color:#7fb89a;line-height:1;margin-bottom:12px;}
.name{font-family:Arial,sans-serif;font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:3px;text-transform:uppercase;margin-bottom:30px;}
.dots{display:flex;gap:10px;justify-content:center;}
.dot{width:9px;height:9px;border-radius:50%;background:#7fb89a;animation:p 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes p{0%,80%,100%{opacity:.15;transform:scale(.8);}40%{opacity:1;transform:scale(1.1);}}
#msg{color:#b85c38;font-family:Arial,sans-serif;font-size:13px;margin-top:24px;display:none;line-height:1.7;}
#msg a{color:#7fb89a;cursor:pointer;text-decoration:underline;}
iframe{display:none;width:100%;height:100%;border:none;position:fixed;top:0;left:0;}
</style>
</head>
<body>
<div id="loader">
  <div>
    <div class="p">P</div>
    <div class="name">Perennial Services Group</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div id="msg"></div>
  </div>
</div>
<iframe id="app"></iframe>
<script>
var RAW = 'https://gist.githubusercontent.com/jgbutler13/75202269e4b6d2fd8bfddcfc85ab0ccf/raw/psg_app.html';

function showErr(m) {
  var el = document.getElementById('msg');
  el.style.display = 'block';
  el.innerHTML = m + '<br><br><a onclick="go()">&#8635; Retry</a>';
}

function go() {
  fetch(RAW + '?t=' + Date.now())
    .then(function(r) {
      if (!r.ok) { showErr('Error ' + r.status); return; }
      return r.text();
    })
    .then(function(html) {
      if (!html || html.length < 100) { showErr('App not found in Gist.'); return; }
      var iframe = document.getElementById('app');
      iframe.style.display = 'block';
      document.getElementById('loader').style.display = 'none';
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open(); doc.write(html); doc.close();
    })
    .catch(function(e) { showErr('Network error: ' + e.message); });
}

go();
</script>
</body>
</html>
